<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Olá, Josué! 🧱⛏️</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif}
  /* céu do Minecraft em cima, grama embaixo */
  body{background:linear-gradient(#79b7ff 0%, #8cc6ff 50%, #6abe30 50%, #4a8b22 74%, #6b4a2b 74%, #5a3d22 100%)}
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}

  /* letreiro deslizando, com letras BLOCO (3D extrudado tipo Minecraft) */
  .track{white-space:nowrap;position:absolute;left:0;top:50%;transform:translateY(-50%);display:flex;will-change:transform;animation:slide 13s linear infinite}
  .name{font-size:15vh;font-weight:900;padding:0 6vw;letter-spacing:.04em;color:#7ec850;
    text-transform:uppercase;
    text-shadow:0 .8vh 0 #3a6b1e, 0 1.6vh 0 #2b4f16, 0 2.2vh 1.2vh rgba(0,0,0,.55)}
  @keyframes slide{from{transform:translate(0,-50%)}to{transform:translate(-50%,-50%)}}

  /* "sol" pixelado girando no canto */
  .sun{position:fixed;top:6vh;left:8vw;width:9vh;height:9vh;background:#ffd83d;
    box-shadow:0 0 0 1vh #ffe98a, 3vh 0 #ffd83d, -3vh 0 #ffd83d, 0 3vh #ffd83d, 0 -3vh #ffd83d;
    animation:spin 18s linear infinite;opacity:.9}
  @keyframes spin{to{transform:rotate(360deg)}}

  .sub{position:fixed;left:0;right:0;bottom:5vh;text-align:center;color:#fff;font-size:3vh;
    letter-spacing:.25em;text-transform:uppercase;text-shadow:0 .4vh 0 #2b4f16, 0 0 1vh rgba(0,0,0,.6);
    animation:blink 1.8s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:.55}50%{opacity:1}}

  /* blocos caindo (Lego + Minecraft) */
  .block{position:fixed;font-size:5vh;animation:fall linear infinite;filter:drop-shadow(0 .4vh .4vh rgba(0,0,0,.4))}
  @keyframes fall{from{transform:translateY(-15vh) rotate(0)}to{transform:translateY(115vh) rotate(200deg)}}
</style>
</head>
<body>
  <div class="sun"></div>
  <div class="stage">
    <div class="track">
      <span class="name">Josué Gomes Morais</span>
      <span class="name">Josué Gomes Morais</span>
    </div>
  </div>
  <div class="sub">🧱 construído bloco a bloco pelo Claude pro Josué ⛏️</div>

  <script>
    const blocks = ['🧱','🟩','🟫','⛏️','💎','🌳','🐷','🗡️','🔶','🟢','🧟','🪓'];
    function spawn(){
      const b = document.createElement('div');
      b.className = 'block';
      b.textContent = blocks[Math.floor(Math.random()*blocks.length)];
      b.style.left = Math.random()*100 + 'vw';
      b.style.fontSize = (3 + Math.random()*5) + 'vh';
      b.style.animationDuration = (4 + Math.random()*4) + 's';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 8000);
    }
    setInterval(spawn, 300);

    // minera! clica e o nome "explode" um pouco como bloco quebrando
    document.addEventListener('click', () => {
      document.querySelectorAll('.name').forEach(n => {
        n.style.transform = 'scale(1.12) rotate(-1deg)';
        n.style.transition = 'transform .15s';
        setTimeout(() => n.style.transform = '', 160);
      });
      // estilha uns blocos no clique
      for(let i=0;i<6;i++) spawn();
    });
  </script>
</body>
</html>
