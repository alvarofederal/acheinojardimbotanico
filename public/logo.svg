<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <style>
      .t1 { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-size: 52px; font-weight: 600; }
      .t2 { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-size: 52px; font-weight: 600; font-style: italic; }
    </style>
  </defs>

  <!-- Fundo branco/areia -->
  <rect width="520" height="120" fill="#FAF7F2"/>

  <!-- Caixa do ícone (rounded square) -->
  <rect x="12" y="24" width="72" height="72" rx="16" fill="rgba(30,92,69,0.10)"/>

  <!-- Folha Lucide (viewBox 0 0 24 24 → scale 2.2, translate para centrar em 48,60) -->
  <g transform="translate(24, 32) scale(2.0)" stroke="#1E5C45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
    <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
  </g>

  <!-- "Achei no " -->
  <text x="100" y="78" class="t1" fill="#2A2A2A">Achei no </text>

  <!-- "Jardim Botânico" em verde itálico -->
  <text x="286" y="78" class="t2" fill="#1E5C45">Jardim Botânico</text>
</svg>
