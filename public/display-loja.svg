<svg xmlns="http://www.w3.org/2000/svg" width="100mm" height="150mm" viewBox="0 0 100 150">
  <defs>
    <!-- Folha reutilizável -->
    <g id="leaf">
      <path d="M0 0 C4 1.6 5 7 0 11 C-5 7 -4 1.6 0 0 Z" />
      <line x1="0" y1="1.5" x2="0" y2="9.8" stroke-width="0.35" stroke-linecap="round" opacity="0.55" />
    </g>
    <!-- Marcador de QR (finder) -->
    <g id="finder">
      <rect width="14" height="14" rx="1" fill="#15281e"/>
      <rect x="2" y="2" width="10" height="10" rx="0.6" fill="#ffffff"/>
      <rect x="4" y="4" width="6" height="6" rx="0.4" fill="#15281e"/>
    </g>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.1" stdDeviation="1.4" flood-color="#1E5C45" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Fundo areia -->
  <rect width="100" height="150" fill="#FAF7F2"/>

  <!-- Faixa de marca (topo) -->
  <rect width="100" height="27" fill="#1E5C45"/>
  <line x1="0" y1="27" x2="100" y2="27" stroke="#D2B48C" stroke-width="0.5" opacity="0.7"/>
  <!-- folha central -->
  <use href="#leaf" transform="translate(50,3) scale(0.85)" fill="#F4F0E8"/>
  <circle cx="50" cy="3.4" r="1.1" fill="#D2B48C"/>
  <!-- wordmark -->
  <text x="50" y="20" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="5.4" font-weight="700" fill="#F4F0E8">Achei no <tspan font-style="italic" fill="#D2B48C">Jardim Botânico</tspan></text>
  <text x="50" y="24.6" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="2.2" font-weight="600" letter-spacing="2.4" fill="#A3C4B3">O GUIA DO BAIRRO</text>

  <!-- Nome da loja -->
  <text x="50" y="45" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="11" font-weight="700" fill="#1E5C45">Quotidiano</text>
  <text x="50" y="51.5" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="3" font-weight="600" letter-spacing="3" fill="#B8945A">BARBER COFFEE</text>

  <!-- Selo de orgulho -->
  <rect x="27" y="55" width="46" height="7.5" rx="3.75" fill="#1E5C45" opacity="0.1"/>
  <text x="50" y="60.1" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="2.6" font-weight="700" letter-spacing="0.4" fill="#1E5C45">✓ FAÇO PARTE DO GUIA DO BAIRRO</text>

  <!-- Cartão branco do QR -->
  <rect x="25" y="67" width="50" height="50" rx="4" fill="#ffffff" filter="url(#soft)"/>

  <!-- QR (placeholder visual — trocar pelo real) -->
  <g>
    <use href="#finder" transform="translate(30,72)"/>
    <use href="#finder" transform="translate(56,72)"/>
    <use href="#finder" transform="translate(30,98)"/>
    <!-- timing -->
    <g fill="#15281e">
      <rect x="46" y="84" width="2" height="2"/><rect x="50" y="84" width="2" height="2"/><rect x="54" y="84" width="2" height="2"/>
      <rect x="42" y="88" width="2" height="2"/><rect x="42" y="92" width="2" height="2"/><rect x="42" y="96" width="2" height="2"/>
      <!-- data modules -->
      <rect x="46" y="76" width="2" height="2"/><rect x="50" y="78" width="2" height="2"/><rect x="52" y="74" width="2" height="2"/>
      <rect x="58" y="88" width="2" height="2"/><rect x="62" y="86" width="2" height="2"/><rect x="66" y="90" width="2" height="2"/>
      <rect x="64" y="98" width="2" height="2"/><rect x="60" y="102" width="2" height="2"/><rect x="66" y="106" width="2" height="2"/>
      <rect x="56" y="108" width="2" height="2"/><rect x="52" y="104" width="2" height="2"/><rect x="58" y="100" width="2" height="2"/>
      <rect x="46" y="100" width="2" height="2"/><rect x="44" y="104" width="2" height="2"/><rect x="48" y="108" width="2" height="2"/>
      <rect x="54" y="112" width="2" height="2"/><rect x="62" y="110" width="2" height="2"/><rect x="66" y="112" width="2" height="2"/>
      <rect x="40" y="100" width="2" height="2"/><rect x="38" y="106" width="2" height="2"/><rect x="44" y="110" width="2" height="2"/>
      <rect x="64" y="76" width="2" height="2"/><rect x="66" y="80" width="2" height="2"/><rect x="60" y="78" width="2" height="2"/>
    </g>
    <!-- centro com folha (estilo QR de marca) -->
    <circle cx="50" cy="92" r="6" fill="#ffffff"/>
    <use href="#leaf" transform="translate(50,87.5) scale(0.8)" fill="#1E5C45"/>
  </g>

  <!-- Chamada de scan -->
  <text x="50" y="126" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="3.7" font-weight="700" fill="#1E5C45">Aponte a câmera do seu celular</text>
  <text x="50" y="131" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="2.9" font-weight="400" fill="#8C7459">e veja fotos, horários e fale no WhatsApp</text>

  <!-- URL curta -->
  <rect x="16" y="135" width="68" height="8.5" rx="4.25" fill="none" stroke="#D2B48C" stroke-width="0.5"/>
  <text x="50" y="140.7" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="3.4" font-weight="500" fill="#1E5C45">acheinojardimbotanico.com.br<tspan font-weight="700" fill="#B8945A">/quotidiano</tspan></text>

  <!-- rodapé -->
  <text x="50" y="147.5" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="2" font-weight="400" letter-spacing="0.5" fill="#A39383">Jardim Botânico · Jardins Mangueiral · Brasília-DF</text>
</svg>
